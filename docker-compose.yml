version: '3.8'

services:

  postgres:
    image: postgres:13
    container_name: mlops-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - mlops_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5


  airflow-init:
    image: mlops-airflow:2.8.0
    build:
      context: .
      dockerfile: Dockerfile.airflow
    user: root
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark%3A%2F%2Fspark-master:7077"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - mlops_data:/opt/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mlops_net
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/data/processed
        chown -R 50000:0 /opt/data
        chmod -R g+rwX /opt/data
        chmod -R a+rwx /opt/data/processed
        su -s /bin/bash airflow -c "airflow db init"
        su -s /bin/bash airflow -c "airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true"


  airflow-webserver:
    image: mlops-airflow:2.8.0
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlops-airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark%3A%2F%2Fspark-master:7077"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - mlops_data:/opt/data
      - ./spark_jobs:/opt/spark_jobs
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - mlops_net
    command: webserver

 
  airflow-scheduler:
    image: mlops-airflow:2.8.0
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: mlops-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark%3A%2F%2Fspark-master:7077"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - mlops_data:/opt/data
      - ./spark_jobs:/opt/spark_jobs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - mlops_net
    command: scheduler

 
  spark-master:
    image: apache/spark:3.5.0
    container_name: mlops-spark-master
    environment:
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - mlops_data:/opt/data
    ports:
      - "8081:8080"
      - "7077:7077"
    networks:
      mlops_net:
        aliases:
          - spark-master
    depends_on:
      - postgres
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"

  # =====================
  # SPARK WORKER (С АВТОМАТИЧЕСКОЙ УСТАНОВКОЙ JDBC)
  # =====================
  spark-worker:
    image: apache/spark:3.5.0
    container_name: mlops-spark-worker
    user: root
    environment:
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - mlops_data:/opt/data
    networks:
      - mlops_net
    depends_on:
      - spark-master
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        umask 000
        mkdir -p /opt/data/processed
        chmod -R a+rwx /opt/data/processed
        exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker --memory 2g --cores 2 spark://spark-master:7077

networks:
  mlops_net:
    driver: bridge

volumes:
  postgres_data:
  mlops_data: