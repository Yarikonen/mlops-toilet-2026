version: '3.8'

services:
  # =====================
  # POSTGRES
  # =====================
  postgres:
    image: postgres:13
    container_name: mlops-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - mlops_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =====================
  # AIRFLOW INIT
  # =====================
  airflow-init:
    image: apache/airflow:2.8.0
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/opt/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mlops_net
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install requests pandas psycopg2-binary
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin

  # =====================
  # AIRFLOW WEBSERVER
  # =====================
  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: mlops-airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: requests pandas psycopg2-binary apache-airflow-providers-apache-spark  

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/opt/data
      - ./spark_jobs:/opt/spark_jobs
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - mlops_net
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install \
          apache-airflow-providers-apache-spark \
          requests \
          pandas \
          psycopg2-binary
        airflow webserver

  # =====================
  # AIRFLOW SCHEDULER
  # =====================
  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: mlops-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: requests pandas psycopg2-binary apache-airflow-providers-apache-spark  
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/opt/data
      - ./spark_jobs:/opt/spark_jobs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - mlops_net
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install \
          apache-airflow-providers-apache-spark \
          requests \
          pandas \
          psycopg2-binary
        airflow scheduler

 
  spark-master:
    image: docker-proxy.artifactory.tcsbank.ru/bitnami/spark:3.5
    container_name: mlops-spark-master
    user: root  # 👈 Важно для установки драйвера
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_MASTER_HOST=spark-master
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./data:/opt/data
    ports:
      - "8081:8084"
      - "7077:7077"
    networks:
      - mlops_net
    depends_on:
      - postgres
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Устанавливаем wget если его нет
        apt-get update && apt-get install -y wget || true
        
        # Скачиваем PostgreSQL JDBC драйвер
        echo "📥 Downloading PostgreSQL JDBC driver..."
        wget -q https://jdbc.postgresql.org/download/postgresql-42.6.0.jar \
          -O /opt/bitnami/spark/jars/postgresql-42.6.0.jar
        
        # Проверяем установку
        if [ -f /opt/bitnami/spark/jars/postgresql-42.6.0.jar ]; then
          echo "✅ JDBC driver installed successfully"
          ls -lh /opt/bitnami/spark/jars/postgresql-42.6.0.jar
        else
          echo "❌ Failed to install JDBC driver"
          exit 1
        fi
        
        # Устанавливаем Python зависимости
        pip install requests pandas psycopg2-binary
        
        # Запускаем Spark Master
        /opt/bitnami/scripts/spark/entrypoint.sh /opt/bitnami/scripts/spark/run.sh

  # =====================
  # SPARK WORKER (С АВТОМАТИЧЕСКОЙ УСТАНОВКОЙ JDBC)
  # =====================
  spark-worker:
    image: docker-proxy.artifactory.tcsbank.ru/bitnami/spark:3.5
    container_name: mlops-spark-worker
    user: root  
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./data:/opt/data
    networks:
      - mlops_net
    depends_on:
      - spark-master
    entrypoint: /bin/bash
    command:
      - -c
      - |
        apt-get update && apt-get install -y wget || true
        
        wget -q https://jdbc.postgresql.org/download/postgresql-42.6.0.jar \
          -O /opt/bitnami/spark/jars/postgresql-42.6.0.jar
        
        if [ -f /opt/bitnami/spark/jars/postgresql-42.6.0.jar ]; then
          echo "JDBC driver installed successfully"
        else
          echo "Failed to install JDBC driver"
          exit 1
        fi
        
        pip install requests pandas psycopg2-binary
        
        /opt/bitnami/scripts/spark/entrypoint.sh /opt/bitnami/scripts/spark/run.sh

networks:
  mlops_net:
    driver: bridge

volumes:
  postgres_data: